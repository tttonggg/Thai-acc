apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: thai-erp-uploads
  namespace: thai-erp
  labels:
    app: thai-erp
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc  # AWS EFS for multi-AZ access
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: thai-erp-logs
  namespace: thai-erp
  labels:
    app: thai-erp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3  # AWS EBS
  resources:
    requests:
      storage: 10Gi
---
# Storage Class for EFS
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: fs-xxxxxxxxxxxxxxxxx
  directoryPerms: "700"
  gidRangeStart: "1000"
  gidRangeEnd: "2000"
  basePath: "/thai-erp"
reclaimPolicy: Retain
volumeBindingMode: Immediate
