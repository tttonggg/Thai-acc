apiVersion: v1
kind: Service
metadata:
  name: thai-erp
  namespace: thai-erp
  labels:
    app: thai-erp
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: thai-erp
---
# Blue-Green Service
apiVersion: v1
kind: Service
metadata:
  name: thai-erp-blue
  namespace: thai-erp
  labels:
    app: thai-erp
    color: blue
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: thai-erp
    color: blue
---
apiVersion: v1
kind: Service
metadata:
  name: thai-erp-green
  namespace: thai-erp
  labels:
    app: thai-erp
    color: green
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: thai-erp
    color: green
---
# Headless service for StatefulSet if needed
apiVersion: v1
kind: Service
metadata:
  name: thai-erp-headless
  namespace: thai-erp
  labels:
    app: thai-erp
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: thai-erp
