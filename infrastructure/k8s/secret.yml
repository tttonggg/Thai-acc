apiVersion: v1
kind: Secret
metadata:
  name: thai-erp-secrets
  namespace: thai-erp
type: Opaque
stringData:
  # NextAuth
  NEXTAUTH_SECRET: "change-this-in-production-use-32-char-secret"
  NEXTAUTH_URL: "https://thai-erp.example.com"
  
  # Database
  DB_USER: "thai_erp_user"
  DB_PASSWORD: "change-this-password"
  DATABASE_URL: "postgresql://thai_erp_user:change-this-password@postgres:5432/thai_erp"
  
  # MinIO / S3
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "change-this-minio-secret"
  
  # S3 (for production)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  
  # External APIs
  SENTRY_DSN: ""
  SLACK_WEBHOOK_URL: ""
  
  # Encryption
  ENCRYPTION_KEY: "change-this-32-char-encryption-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: thai-erp-registry
  namespace: thai-erp
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-encoded-docker-config>
