apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thai-erp
  namespace: thai-erp
  labels:
    app: thai-erp
  annotations:
    # NGINX Ingress Controller
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://thai-erp.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # Cert Manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # External DNS
    external-dns.alpha.kubernetes.io/hostname: "thai-erp.example.com"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - thai-erp.example.com
        - www.thai-erp.example.com
      secretName: thai-erp-tls
  rules:
    - host: thai-erp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thai-erp
                port:
                  number: 80
    - host: www.thai-erp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thai-erp
                port:
                  number: 80
---
# Staging Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thai-erp-staging
  namespace: thai-erp-staging
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.thai-erp.example.com
      secretName: thai-erp-staging-tls
  rules:
    - host: staging.thai-erp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thai-erp
                port:
                  number: 80
