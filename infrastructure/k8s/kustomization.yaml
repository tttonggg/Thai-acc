apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: thai-erp

resources:
  - namespace.yml
  - configmap.yml
  - secret.yml
  - serviceaccount.yml
  - deployment.yml
  - service.yml
  - ingress.yml
  - hpa.yml
  - pvc.yml

images:
  - name: ghcr.io/thai-erp/thai-erp
    newTag: latest

configMapGenerator:
  - name: thai-erp-config
    behavior: merge
    literals:
      - NODE_ENV=production

secretGenerator:
  - name: thai-erp-secrets
    behavior: merge
    literals:
      - NEXTAUTH_URL=https://thai-erp.example.com

patchesStrategicMerge:
  - patches/replicas.yaml

commonLabels:
  app.kubernetes.io/name: thai-erp
  app.kubernetes.io/part-of: thai-erp
