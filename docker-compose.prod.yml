services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: thaiacc
      POSTGRES_USER: thaiacc
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No port mapping — internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thaiacc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - thai-acc-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://thaiacc:${DB_PASSWORD}@db:5432/thaiacc
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - thai-acc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on:
      - backend
    networks:
      - thai-acc-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - thai-acc-network

volumes:
  postgres_data:
  backend_logs:

networks:
  thai-acc-network:
    driver: bridge
