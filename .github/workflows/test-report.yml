name: Test Report Generator

###############################################################################
# Test Report Generation and Publishing Workflow
#
# Generates comprehensive test reports with:
# - Test execution metrics
# - Coverage trends
# - Historical comparisons
# - Visual regression reports
# - Performance benchmarks
###############################################################################

on:
  workflow_run:
    workflows: ['Test Automation']
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Specific workflow run to generate report for'
        required: false
        type: string

env:
  NODE_VERSION: '20'

###############################################################################
# Jobs
###############################################################################

jobs:
  generate-report:
    name: Generate Test Report
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts/
          pattern: '*-test-results-*'
          merge-multiple: true

      - name: Generate HTML report
        run: |
          bun run ts-node scripts/generate-playwright-report.ts

      - name: Generate coverage report
        run: |
          if [[ -f coverage/lcov.info ]]; then
            bun run ts-node scripts/generate-coverage-report.ts
          fi

      - name: Generate metrics report
        run: |
          bun run ts-node scripts/generate-test-metrics.ts

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            test-reports/
            coverage-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./test-reports
          publish_branch: gh-pages

      - name: Comment with report link
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const reportUrl = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-report/`;

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## 📊 Test Report Generated\n\nView the detailed test report here: ${reportUrl}\n\nGenerated from workflow run: ${{ github.event.workflow_run.id }}`
            });

  coverage-trends:
    name: Coverage Trends
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download historical coverage
        uses: actions/cache/restore@v3
        with:
          path: coverage-history/
          key: coverage-history-${{ github.run_id }}
          restore-keys: |
            coverage-history-

      - name: Parse coverage data
        run: |
          bun run ts-node scripts/parse-coverage-data.ts

      - name: Generate trend visualization
        run: |
          bun run ts-node scripts/generate-coverage-trends.ts

      - name: Upload coverage trends
        uses: actions/upload-artifact@v4
        with:
          name: coverage-trends
          path: coverage-trends/
          retention-days: 90

      - name: Save coverage history
        uses: actions/cache/save@v3
        with:
          path: coverage-history/
          key: coverage-history-${{ github.run_id }}

  flaky-test-detector:
    name: Flaky Test Detector
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Download test history
        uses: actions/download-artifact@v4
        with:
          path: test-history/
          pattern: '*-test-history-*'

      - name: Analyze flaky tests
        run: |
          bun run ts-node scripts/detect-flaky-tests.ts

      - name: Create GitHub issue for flaky tests
        if: hashFiles('flaky-tests-report.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const flakyTests = JSON.parse(fs.readFileSync('flaky-tests-report.json', 'utf8'));

            if (flakyTests.length > 0) {
              const body = `## 🚨 Flaky Tests Detected\n\n` +
                `The following tests have shown inconsistent behavior:\n\n` +
                flakyTests.map(test =>
                  `### \`${test.name}\`\n` +
                  `- File: \`${test.file}\`\n` +
                  `- Failure rate: ${test.failureRate}%\n` +
                  `- Recent runs: ${test.recentRuns}\n`
                ).join('\n') +
                `\n\nPlease investigate and fix these tests.\n` +
                `\nGenerated from workflow: ${{ github.run_id }}`;

              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Flaky Tests Detected - ${new Date().toISOString().split('T')[0]}`,
                body: body,
                labels: ['testing', 'flaky-tests', 'automated-report']
              });
            }

      - name: Upload flaky test report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-report
          path: flaky-tests-report.json
          retention-days: 30
