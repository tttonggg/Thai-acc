name: Test Automation

###############################################################################
# Comprehensive Test Automation Workflow
#
# Features:
# - Multi-tier testing (smoke, quick, full)
# - Parallel execution
# - Test result artifacts
# - Coverage reporting
# - Historical tracking
# - Slack/Discord notifications
# - Scheduled runs
###############################################################################

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  schedule:
    # Run quick tests daily at 2 AM UTC
    - cron: '0 2 * * *'
    # Run full tests weekly on Sunday at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level'
        required: true
        default: 'quick'
        type: choice
        options:
          - smoke
          - quick
          - full
      module:
        description: 'Specific module to test (optional)'
        required: false
        type: string
      notify:
        description: 'Send notifications'
        required: false
        type: boolean
        default: true

env:
  NODE_VERSION: '20'
  DATABASE_URL: file:./dev.db
  CI: true
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

###############################################################################
# Jobs
###############################################################################

jobs:
  ###############################################################################
  # Smoke Tests - Critical Path Only
  # Run on: Every push, every PR, hourly
  # Duration: 2-3 minutes
  ###############################################################################
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event.inputs.test_level == 'smoke'

    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Setup database
        run: |
          bun run db:push
          bun run seed

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start development server
        run: |
          bun run dev &
          echo $! > .dev-server.pid
          echo "Waiting for server to start..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1
          echo "Server started successfully"

      - name: Run smoke tests
        run: |
          ./scripts/test-automation.sh smoke
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
            test-artifacts/
          retention-days: 7

      - name: Upload test history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-history
          path: test-history/
          retention-days: 30

  ###############################################################################
  # Quick Tests - Smoke + Critical
  # Run on: Every push to main/develop, every PR, daily
  # Duration: 5 minutes
  ###############################################################################
  quick-tests:
    name: Quick Tests
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')) ||
      (github.event_name == 'schedule' && github.event.schedule[0] == '0 2 * * *') ||
      github.event_name == 'pull_request' ||
      github.event.inputs.test_level == 'quick'

    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Setup database
        run: |
          bun run db:push
          bun run seed

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Start development server
        run: |
          bun run dev &
          echo $! > .dev-server.pid
          echo "Waiting for server to start..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1
          echo "Server started successfully"

      - name: Run quick tests
        run: |
          ./scripts/test-automation.sh quick
        continue-on-error: false

      - name: Run unit tests
        run: bun run test:run

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-test-results
          path: |
            test-results/
            playwright-report/
            test-artifacts/
          retention-days: 7

      - name: Generate test summary
        if: always()
        run: |
          ./scripts/test-automation.sh report

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🧪 Quick Test Results\n\n';

            try {
              const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
              comment += `✅ Passed: ${results.stats.expected}\n`;
              comment += `❌ Failed: ${results.stats.unexpected || 0}\n`;
              comment += `⏭️ Skipped: ${results.stats.skipped || 0}\n`;
            } catch (e) {
              comment += '⚠️ Could not parse test results\n';
            }

            comment += '\n📊 [View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  ###############################################################################
  # Full Test Suite
  # Run on: Merge to main, weekly
  # Duration: 15-20 minutes
  ###############################################################################
  full-tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'schedule' && github.event.schedule[0] == '0 3 * * 0') ||
      github.event.inputs.test_level == 'full'

    timeout-minutes: 30

    strategy:
      matrix:
        shard: [1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Setup database
        run: |
          bun run db:push
          bun run seed

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Start development server
        run: |
          bun run dev &
          echo $! > .dev-server.pid
          echo "Waiting for server to start..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1
          echo "Server started successfully"

      - name: Run full test suite (shard ${{ matrix.shard }})
        run: |
          bun run test:e2e --shard=${{ matrix.shard }}/4

      - name: Run unit tests with coverage
        run: bun run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-shard-${{ matrix.shard }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
            test-artifacts/
            coverage/
          retention-days: 14

  ###############################################################################
  # Module Tests - Specific Module
  # Run on: Manual trigger
  # Duration: Varies by module
  ###############################################################################
  module-tests:
    name: Module Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.module != ''

    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Setup database
        run: |
          bun run db:push
          bun run seed

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start development server
        run: |
          bun run dev &
          echo $! > .dev-server.pid
          echo "Waiting for server to start..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1
          echo "Server started successfully"

      - name: Run module tests
        run: |
          ./scripts/test-automation.sh module "${{ github.event.inputs.module }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-test-results-${{ github.event.inputs.module }}
          path: |
            test-results/
            playwright-report/
            test-artifacts/
          retention-days: 7

  ###############################################################################
  # Database Verification
  # Run on: Every test run
  # Duration: 1 minute
  ###############################################################################
  database-verification:
    name: Database Verification
    runs-on: ubuntu-latest
    if: always()

    needs: [smoke-tests, quick-tests]
    if: always() && (needs.smoke-tests.result == 'success' || needs.quick-tests.result == 'success')

    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Setup database
        run: |
          bun run db:push
          bun run seed

      - name: Verify database integrity
        run: ./scripts/verify-database.sh

      - name: Check accounting invariants
        run: |
          bun run ts-node scripts/check-accounting-invariants.ts || true

  ###############################################################################
  # Notifications
  # Run on: Always
  ###############################################################################
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [smoke-tests, quick-tests, full-tests, database-verification]
    if: always() && github.event.inputs.notify == 'true'

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Test Automation: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Automation ${{ job.status }}*\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}\n*Workflow:* ${{ github.workflow }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''

      - name: Send Discord notification
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "Test Automation ${{ job.status }}",
                "color": ${{ job.status == 'success' && '3066993' || '15158332' }},
                "fields": [
                  {"name": "Repository", "value": "${{ github.repository }}", "inline": true},
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true}
                ],
                "timestamp": "${{ github.event.head_commit.timestamp }}"
              }]
            }'
        if: env.DISCORD_WEBHOOK_URL != ''

  ###############################################################################
  # Test Report Summary
  # Run on: Always
  ###############################################################################
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-tests, quick-tests, full-tests, database-verification]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results-all/

      - name: Generate summary report
        run: |
          echo "# 🧪 Test Automation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quick Tests | ${{ needs.quick-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Tests | ${{ needs.full-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Verification | ${{ needs.database-verification.result }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test results and artifacts are available for download from this workflow run." >> $GITHUB_STEP_SUMMARY
