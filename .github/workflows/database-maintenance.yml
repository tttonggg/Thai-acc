name: Database Maintenance

on:
  schedule:
    # Weekly on Sundays at 5 AM UTC
    - cron: '0 5 * * 0'
  workflow_dispatch:

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Analyze tables
        run: |
          psql "$DATABASE_URL" -c "SELECT analyze_all_tables();"

      - name: Refresh materialized views
        run: |
          psql "$DATABASE_URL" -c "SELECT refresh_all_materialized_views();"

      - name: Maintain partitions
        run: |
          psql "$DATABASE_URL" -c "SELECT maintain_partitions();"

      - name: Check database health
        run: |
          psql "$DATABASE_URL" -c "
            SELECT 
              schemaname,
              tablename,
              n_tup_ins as inserts,
              n_tup_upd as updates,
              n_tup_del as deletes,
              n_live_tup as live_tuples,
              n_dead_tup as dead_tuples,
              CASE 
                WHEN n_live_tup > 0 THEN round(100.0 * n_dead_tup / n_live_tup, 2)
                ELSE 0
              END as dead_tuple_ratio
            FROM pg_stat_user_tables
            ORDER BY n_dead_tup DESC
            LIMIT 10;
          "

      - name: Notify Slack
        if: always()
        run: |
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "✅" || echo "❌")
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${STATUS} Database maintenance completed\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
