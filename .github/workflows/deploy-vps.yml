# ============================================
# Thai Accounting ERP - VPS Auto-Deployment
# Auto-deploys to production VPS after CI passes
# ============================================

name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy-vps:
    name: 🚀 Deploy to Production VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: false
          command_timeout: 20m
          script: |
            #!/bin/bash
            set -e

            echo "🔄 Starting deployment to VPS..."
            cd /root

            # Backup existing database and .env from old deployment
            mkdir -p /tmp/thai-acc-backup
            if [ -d "thai-acc/prisma" ] && [ -f "thai-acc/prisma/dev.db" ]; then
              cp thai-acc/prisma/dev.db /tmp/thai-acc-backup/dev.db
              echo "✅ Database backed up ($(ls -lh /tmp/thai-acc-backup/dev.db | awk '{print $5}'))"
            fi
            if [ -f "thai-acc/.env" ]; then
              cp thai-acc/.env /tmp/thai-acc-backup/.env
              echo "✅ .env backed up"
            fi

            # Remove old deployment
            rm -rf thai-acc thai-acc-new
            echo "✅ Old deployment removed"

            # Clone fresh repo
            echo "📥 Cloning repository..."
            git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/tttonggg/Thai-acc.git thai-acc
            cd thai-acc
            git checkout ${{ github.sha }}
            echo "✅ Repository cloned and checked out"

            # Create .env from backup OR create minimal one
            if [ -f /tmp/thai-acc-backup/.env ]; then
              cp /tmp/thai-acc-backup/.env thai-acc/.env
              echo "✅ .env restored from backup"
            else
              # Create minimal .env with required vars
              cat > thai-acc/.env << 'EOF'
DATABASE_URL=file:/root/thai-acc/prisma/dev.db
NEXTAUTH_URL=https://acc.k56mm.uk
NEXTAUTH_SECRET=B/lLqgzybPsxU6dNnvb/wG5XuEpfVfU68pVN0A7KseY=
NODE_ENV=production
EOF
              echo "✅ Created minimal .env"
            fi

            # Install dependencies
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps --ignore-scripts

            # Restore database (if backup exists)
            if [ -f /tmp/thai-acc-backup/dev.db ]; then
              mkdir -p thai-acc/prisma
              cp /tmp/thai-acc-backup/dev.db thai-acc/prisma/dev.db
              echo "✅ Database restored ($(ls -lh thai-acc/prisma/dev.db | awk '{print $5}'))"
            fi

            # Generate Prisma client
            echo "🗄️  Generating Prisma client..."
            npm run db:generate

            # Build application
            echo "🔨 Building..."
            npm run build

            # Kill existing server
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 2

            # Start server
            echo "🔄 Starting server..."
            nohup node .next/standalone/thai-acc/server.js > /root/thai-acc/server.log 2>&1 &
            SERVER_PID=$!
            echo "Server PID: $SERVER_PID"

            # Wait for server
            echo "⏳ Waiting for server..."
            for i in {1..30}; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Server responded after ${i}s"
                break
              fi
              sleep 1
            done

            # Health check
            HEALTH_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/health || echo "000")
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HEALTH_STATUS)"
            else
              echo "❌ Health check failed (HTTP $HEALTH_STATUS)"
              tail -50 /root/thai-acc/server.log
              exit 1
            fi

            # Check tunnel
            echo "🌐 Checking cloudflared tunnel..."
            if pgrep -f "cloudflared tunnel run" > /dev/null; then
              echo "✅ Tunnel running"
            else
              echo "⚠️  Starting tunnel..."
              nohup cloudflared tunnel run --token ${{ secrets.CLOUDFLARED_TUNNEL_TOKEN }} > /tmp/cloudflared.log 2>&1 &
              sleep 3
            fi

            echo "🎉 Deployment complete!"
            echo "📍 https://acc.k56mm.uk"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment successful! Commit: ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          exit 1
