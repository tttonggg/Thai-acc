# ============================================
# Thai Accounting ERP - VPS Auto-Deployment
# Auto-deploys to production VPS after CI passes
# ============================================

name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy-vps:
    name: 🚀 Deploy to Production VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: false
          command_timeout: 20m
          script: |
            #!/bin/bash
            set -e

            echo "🔄 Starting deployment to VPS..."
            cd /root

            # Fresh clone
            if [ -d "thai-acc-new" ]; then
              rm -rf thai-acc-new
            fi
            git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/tongztang/thai-acc.git thai-acc-new
            cd thai-acc-new
            git checkout ${{ github.sha }}

            # Copy existing .env and database
            cd /root
            if [ -d "thai-acc" ]; then
              cp thai-acc/.env thai-acc-new/.env 2>/dev/null || true
              cp thai-acc/prisma/dev.db thai-acc-new/prisma/dev.db 2>/dev/null || true
              rm -rf thai-acc
            fi
            mv thai-acc-new thai-acc
            cd /root/thai-acc

            # Kill existing server
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 2

            # Install & build
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps --ignore-scripts
            npm run db:generate
            echo "🔨 Building..."
            npm run build

            # Start server
            echo "🔄 Starting server..."
            nohup node .next/standalone/server.js > /root/thai-acc/server.log 2>&1 &
            SERVER_PID=$!
            echo "Server PID: $SERVER_PID"

            # Wait for server
            echo "⏳ Waiting for server..."
            for i in {1..30}; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Server responded after ${i}s"
                break
              fi
              sleep 1
            done

            # Health check
            HEALTH_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/health || echo "000")
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HEALTH_STATUS)"
            else
              echo "❌ Health check failed (HTTP $HEALTH_STATUS)"
              tail -50 server.log
              exit 1
            fi

            # Check tunnel
            echo "🌐 Checking cloudflared tunnel..."
            if pgrep -f "cloudflared tunnel run" > /dev/null; then
              echo "✅ Tunnel running"
            else
              echo "⚠️  Starting tunnel..."
              nohup cloudflared tunnel run --token ${{ secrets.CLOUDFLARED_TUNNEL_TOKEN }} > /tmp/cloudflared.log 2>&1 &
              sleep 3
            fi

            echo "🎉 Deployment complete!"
            echo "📍 https://acc.k56mm.uk"

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment successful! Commit: ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          exit 1
