# ============================================
# Thai Accounting ERP - Docker-Based VPS Deployment
# Builds Linux container on GitHub Actions, deploys to VPS
# ============================================

name: Deploy to VPS (Docker)

on:
  push:
    branches: [master]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/thai-acc

jobs:
  # ============================================
  # Job 1: Build and Push Docker Image
  # ============================================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2: Deploy to VPS
  # ============================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: false
          command_timeout: 15m
          script: |
            #!/bin/bash
            set -e

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            CONTAINER_NAME="thai-acc-app"
            VOLUME_PATH="/root/data/thai-acc-erp"

            echo "🔄 Starting Docker deployment..."
            echo "📦 Image: $IMAGE"

            # Stop and remove existing container
            echo "🛑 Stopping existing container..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true

            # Pull the new image
            echo "📥 Pulling Docker image..."
            docker pull $IMAGE

            # Ensure volume directory exists
            mkdir -p $VOLUME_PATH

            # Start new container
            echo "🚀 Starting container..."
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e DATABASE_URL=file:/app/prisma/dev.db \
              -e NEXTAUTH_URL=https://acc.k56mm.uk \
              -e NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} \
              -e BYPASS_CSRF=true \
              -v $VOLUME_PATH:/app/prisma \
              $IMAGE

            # Fix file ownership for nextjs user (UID 1001)
            chown -R 1001:1001 $VOLUME_PATH/

            # Push schema if database exists
            if [ -f "$VOLUME_PATH/dev.db" ]; then
              echo "📐 Pushing schema updates..."
              docker exec $CONTAINER_NAME npx prisma db push --schema=/app/node_modules/.prisma/client/schema.prisma --accept-data-loss --skip-generate 2>/dev/null || true
            fi

            # Restart to pick up schema changes
            docker restart $CONTAINER_NAME

            # Wait for container to start
            echo "⏳ Waiting for app to start..."
            sleep 10

            # Health check
            echo "🏥 Health check..."
            for i in {1..30}; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Server responded after ${i}s"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ Health check failed"
                docker logs $CONTAINER_NAME | tail -50
                exit 1
              fi
              sleep 2
            done

            echo "🎉 Deployment complete!"
            echo "📍 https://acc.k56mm.uk"
            echo "📦 Container info:"
            docker ps | grep $CONTAINER_NAME
