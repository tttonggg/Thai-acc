# ============================================
# Thai Accounting ERP - VPS Auto-Deployment
# Auto-deploys to production VPS after CI passes
# ============================================

name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  # ============================================
  # Job: Deploy to Production VPS
  # ============================================
  deploy-vps:
    name: 🚀 Deploy to Production VPS
    runs-on: ubuntu-latest
    # Run on push to master or manual trigger
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: false
          command_timeout: 20m
          script: |
            #!/bin/bash
            set -e

            echo "🔄 Starting deployment to VPS..."

            # Fresh clone - VPS has no git repo
            echo "📥 Cloning fresh repository..."
            cd /root
            if [ -d "thai-acc-new" ]; then
              rm -rf thai-acc-new
            fi
            git clone https://github.com/tongztang/thai-acc.git thai-acc-new
            cd thai-acc-new
            git checkout ${{ github.sha }}

            # Copy to thai-acc (keep existing database)
            cd /root
            if [ -d "thai-acc" ]; then
              # Backup existing .env and database
              cp thai-acc/.env thai-acc-new/.env 2>/dev/null || true
              cp thai-acc/prisma/dev.db thai-acc-new/prisma/dev.db 2>/dev/null || true
              # Remove old and rename new
              rm -rf thai-acc
            fi
            mv thai-acc-new thai-acc
            cd /root/thai-acc

            # Kill any existing server (use port 3000 check instead of pkill to avoid killing SSH)
            echo "🔄 Checking for existing server..."
            if lsof -i:3000 > /dev/null 2>&1; then
              echo "Port 3000 in use, will restart after build"
            fi

            # Install dependencies
            echo "📦 Installing dependencies..."
            npm install --legacy-peer-deps --ignore-scripts

            # Generate Prisma client
            echo "🗄️  Generating Prisma client..."
            npm run db:generate

            # Build application
            echo "🔨 Building application..."
            npm run build

            # Use screen to persist the server (if available)
            echo "🔄 Starting server..."

            # Kill any existing node server on port 3000 (safer approach)
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 3

            # Start server - use nohup with full path
            cd /root/thai-acc
            nohup node .next/standalone/server.js > /root/thai-acc/server.log 2>&1 &
            SERVER_PID=$!
            echo "Server started with PID: $SERVER_PID"

            # Wait for server to be ready (up to 30 seconds)
            echo "⏳ Waiting for server to start..."
            for i in {1..30}; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Server responded after ${i}s"
                break
              fi
              sleep 1
            done

            # Health check
            echo "🏥 Running health check..."
            HEALTH_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/health || echo "000")
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HEALTH_STATUS)"
            else
              echo "❌ Health check failed (HTTP $HEALTH_STATUS)"
              tail -50 server.log
              exit 1
            fi

            # Check cloudflared tunnel
            echo "🌐 Checking cloudflared tunnel..."
            if pgrep -f "cloudflared tunnel run" > /dev/null; then
              echo "✅ Cloudflared tunnel is running"
            else
              echo "⚠️  Cloudflared tunnel not running, starting..."
              nohup cloudflared tunnel run --token ${{ secrets.CLOUDFLARED_TUNNEL_TOKEN }} > /tmp/cloudflared.log 2>&1 &
              sleep 3
            fi

            echo "🎉 Deployment completed successfully!"
            echo "📍 Application: https://acc.k56mm.uk"
            echo "📊 Health check: https://acc.k56mm.uk/api/health"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Author: ${{ github.actor }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above for details"
          exit 1
