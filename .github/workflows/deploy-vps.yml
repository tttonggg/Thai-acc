# ============================================
# Thai Accounting ERP - Docker-Based VPS Deployment
# Builds Linux container on GitHub Actions, deploys to VPS
# ============================================

name: Deploy to VPS (Docker)

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/thai-acc
  VERSION: ${{ github.sha }}

jobs:
  # ============================================
  # Job 1: Build and Push Docker Image
  # ============================================
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2: Deploy to VPS
  # ============================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: false
          command_timeout: 15m
          script: |
            #!/bin/bash
            set -e

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
            CONTAINER_NAME="thai-acc-app"
            VOLUME_PATH="/root/thai-acc"

            echo "🔄 Starting Docker deployment..."
            echo "📦 Image: $IMAGE"

            # Stop and remove existing container
            echo "🛑 Stopping existing container..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true

            # Pull the new image
            echo "📥 Pulling Docker image..."
            docker pull $IMAGE

            # Create volume directory
            mkdir -p $VOLUME_PATH/prisma

            # Backup database if exists
            if [ -f "$VOLUME_PATH/prisma/dev.db" ]; then
              cp $VOLUME_PATH/prisma/dev.db /tmp/thai-acc-db-backup.db
              echo "✅ Database backed up"
            fi

            # Backup .env if exists
            if [ -f "$VOLUME_PATH/.env" ]; then
              cp $VOLUME_PATH/.env /tmp/thai-acc-env-backup
              echo "✅ .env backed up"
            fi

            # Start new container
            echo "🚀 Starting container..."
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e DATABASE_URL=file:$VOLUME_PATH/prisma/dev.db \
              -e NEXTAUTH_URL=https://acc.k56mm.uk \
              -e NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} \
              -e NEXTAUTH_DISABLE_NON_LOCALHOST=true \
              -v $VOLUME_PATH/prisma:/app/prisma \
              $IMAGE

            # Restore database
            if [ -f /tmp/thai-acc-db-backup.db ]; then
              cp /tmp/thai-acc-db-backup.db $VOLUME_PATH/prisma/dev.db
              echo "✅ Database restored"
            fi

            # Restore .env
            if [ -f /tmp/thai-acc-env-backup ]; then
              cp /tmp/thai-acc-env-backup $VOLUME_PATH/.env
              echo "✅ .env restored"
            fi

            # Wait for container to start
            echo "⏳ Waiting for app to start..."
            sleep 10

            # Health check
            echo "🏥 Health check..."
            for i in {1..30}; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ Server responded after ${i}s"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ Health check failed"
                docker logs $CONTAINER_NAME | tail -50
                exit 1
              fi
              sleep 2
            done

            # Check tunnel
            echo "🌐 Checking cloudflared tunnel..."
            if pgrep -f "cloudflared tunnel run" > /dev/null; then
              echo "✅ Tunnel running"
            else
              echo "⚠️  Starting tunnel..."
              nohup cloudflared tunnel run --token ${{ secrets.CLOUDFLARED_TUNNEL_TOKEN }} > /tmp/cloudflared.log 2>&1 &
              sleep 3
            fi

            echo "🎉 Deployment complete!"
            echo "📍 https://acc.k56mm.uk"
            echo "📦 Container info:"
            docker ps | grep $CONTAINER_NAME
