name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  DATABASE_URL: file:./dev.db

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      # Optional: Add PostgreSQL service for production-like testing
      # postgres:
      #   image: postgres:16
      #   env:
      #     POSTGRES_USER: postgres
      #     POSTGRES_PASSWORD: postgres
      #     POSTGRES_DB: thai_accounting_test
      #   options: >-
      #     --health-cmd pg_isready
      #     --health-interval 10s
      #     --health-timeout 5s
      #     --health-retries 5
      #   ports:
      #     - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Setup database
        run: |
          bun run db:push
          bun run seed

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Start development server
        run: |
          bun run dev &
          echo $! > .dev-server.pid
          echo "Waiting for server to start..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1
          echo "Server started successfully"

      - name: Run quick smoke tests
        run: chmod +x scripts/test-quick.sh && ./scripts/test-quick.sh
        continue-on-error: true

      - name: Run full E2E tests
        run: npx playwright test --reporter=html
        env:
          CI: true

      - name: Stop development server
        if: always()
        run: |
          if [ -f .dev-server.pid ]; then
            kill $(cat .dev-server.pid) || true
            rm .dev-server.pid
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/screenshots/
          retention-days: 30

      - name: Upload database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-database
          path: prisma/dev.db
          retention-days: 7

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🧪 E2E Test Results\n\n';

            try {
              const reportPath = 'playwright-report/index.html';
              if (fs.existsSync(reportPath)) {
                comment += '✅ Tests completed. See [full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n';
              }
            } catch (error) {
              comment += '⚠️ Could not read test report.\n\n';
            }

            comment += '### Test Artifacts\n';
            comment += '- 📊 [Playwright Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
            comment += '- 📸 Screenshots (if failures)\n';
            comment += '- 🗄️ Test Database\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  lint-check:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          if [ -d ".next/standalone" ]; then
            echo "✅ Standalone build successful"
            ls -lh .next/standalone/
          else
            echo "❌ Standalone build failed"
            exit 1
          fi
