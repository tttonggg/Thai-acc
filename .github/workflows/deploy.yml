name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend locally
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: /api/v1

      - name: Create deploy tarball
        run: |
          tar czf /tmp/thai-acc-deploy.tar.gz \
            --exclude='.git' \
            --exclude='*/node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='*.tar.gz' \
            --exclude='frontend/.next/cache' \
            .

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 135.181.107.76
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "/tmp/thai-acc-deploy.tar.gz"
          target: "/root/thai-acc/"
          strip_components: 2

      - name: Ensure .env exists on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 135.181.107.76
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            if [ ! -f /root/thai-acc/.env ]; then
              echo "WARNING: .env file not found on VPS. Creating from .env.example..."
              cp /root/thai-acc/.env.example /root/thai-acc/.env || echo "No .env.example either!"
            fi

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 135.181.107.76
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/thai-acc
            echo "Extracting new code..."
            tar xzf thai-acc-deploy.tar.gz
            rm thai-acc-deploy.tar.gz
            echo "Copying production configs..."
            cp docker-compose.prod.yml docker-compose.yml
            cp nginx.prod.conf nginx.conf
            echo "Building and deploying..."
            docker compose down 2>/dev/null || true
            docker compose up -d --build
            echo "Running migrations..."
            sleep 5
            docker compose exec -T backend alembic upgrade head || echo "Migration may need retry"
            echo "Health check..."
            curl -sf http://localhost:3001/health && echo "✅ Deploy successful" || echo "⚠️ Health check failed"
            echo "Cleaning up old Docker images..."
            docker image prune -af --filter "until=168h" || true

      - name: Notify on success
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Thai ACC deployed successfully!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Thai ACC Production Deploy*\n✅ Deployed successfully to `135.181.107.76:3001`\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Thai ACC deploy failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Thai ACC Production Deploy*\n❌ Deploy failed!\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
