name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  # Job 1: Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Run type check
        run: bun run type-check
        continue-on-error: true

      - name: Run lint
        run: bun run lint:fix --max-warnings 100
        continue-on-error: true
        timeout-minutes: 15

      - name: Run smoke tests
        run: bun run test:quick
        continue-on-error: true
        timeout-minutes: 15

  # Job 2: Build Application
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/standalone
          retention-days: 7

  # Job 3: Deploy to VPS
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next/standalone

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          # Deploy application files
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .next/standalone/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_PATH }}/

          # Deploy public files
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            public/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_PATH }}/public/

          # Update .env file on VPS
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_APP_PATH }} && \
             echo 'DATABASE_URL=${{ secrets.DATABASE_URL }}' > .env && \
             echo 'NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}' >> .env && \
             echo 'NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}' >> .env && \
             echo 'NODE_ENV=production' >> .env"

      - name: Restart Application
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "source ~/.bashrc 2>/dev/null || true && \
             cd ${{ secrets.VPS_APP_PATH }} && \
             pm2 restart keerati-erp 2>/dev/null || \
             (./node_modules/.bin/bun run start 2>/dev/null && \
              pm2 start ./node_modules/.bin/bun --name keerati-erp) || \
             (bun run start 2>/dev/null || npm start)"

      - name: Health Check
        run: |
          sleep 10
          curl -f ${{ secrets.NEXTAUTH_URL }}/api/health || exit 1

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Application is now running at: ${{ secrets.NEXTAUTH_URL }}"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs and try again."
