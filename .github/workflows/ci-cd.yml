# ============================================
# Thai Accounting ERP - Complete CI/CD Pipeline
# Phase H: DevOps & CI/CD Implementation
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Job 1: Code Quality & Static Analysis
  # ============================================
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Check for circular dependencies
        run: npx madge --circular src/ || true

  # ============================================
  # Job 2: Secret Detection
  # ============================================
  secret-detection:
    name: 🔐 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ============================================
  # Job 3: Unit Tests with Coverage (90%+ required)
  # ============================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, secret-detection]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold (90%)
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 90% threshold"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ============================================
  # Job 4: Integration Tests
  # ============================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: thai_erp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/thai_erp_test
        run: npx prisma migrate deploy

      - name: Seed test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/thai_erp_test
        run: npm run seed

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/thai_erp_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
        run: npm run test:integration

  # ============================================
  # Job 5: E2E Tests with Playwright
  # ============================================
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: file:./prisma/dev.db
          NEXTAUTH_SECRET: test-secret-for-e2e
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-failures
          path: test-results/
          retention-days: 7

  # ============================================
  # Job 6: Security Scanning
  # ============================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk test
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  # ============================================
  # Job 7: CodeQL Analysis
  # ============================================
  codeql-analysis:
    name: 🛡️ CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ============================================
  # Job 8: Dependency Review
  # ============================================
  dependency-review:
    name: 📦 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: moderate
          allow-licenses: MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause

  # ============================================
  # Job 9: Build & Push Docker Image with SBOM
  # ============================================
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [e2e-tests, security-scan, codeql-analysis]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-container-results.sarif'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: anchore/sbom-action/publish-sbom@v0
        with:
          sbom-artifact-match: "^sbom.spdx.json$"

  # ============================================
  # Job 10: Deploy to Staging (Blue-Green)
  # ============================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.thai-erp.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name thai-erp-staging

      - name: Blue-Green Deployment to Staging
        id: deploy
        run: |
          #!/bin/bash
          set -e
          
          # Determine current color
          CURRENT_COLOR=$(kubectl get svc thai-erp-staging -n staging -o jsonpath='{.spec.selector.color}' 2>/dev/null || echo "blue")
          
          if [ "$CURRENT_COLOR" = "blue" ]; then
            NEW_COLOR="green"
          else
            NEW_COLOR="blue"
          fi
          
          echo "Current color: $CURRENT_COLOR, Deploying to: $NEW_COLOR"
          echo "new_color=$NEW_COLOR" >> $GITHUB_OUTPUT
          echo "current_color=$CURRENT_COLOR" >> $GITHUB_OUTPUT
          
          # Deploy to inactive environment
          helm upgrade --install thai-erp-staging-${{ env.new_color }} ./infrastructure/helm \
            --namespace staging \
            --set image.tag=${{ github.sha }} \
            --set color=${{ env.new_color }} \
            --set replicaCount=2 \
            --set ingress.host=staging.thai-erp.example.com \
            --wait --timeout 10m
          
          # Wait for rollout
          kubectl rollout status deployment/thai-erp-staging-${{ env.new_color }} -n staging --timeout=5m
          
          # Run smoke tests
          echo "Running smoke tests..."
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl \
            -- curl -sf http://thai-erp-staging-${{ env.new_color }}.staging.svc.cluster.local/api/health || {
              echo "❌ Smoke tests failed"
              exit 1
            }
          
          # Run health checks
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://thai-erp-staging-${{ env.new_color }}.staging.svc.cluster.local/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              break
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done
          
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health checks failed after 5 attempts"
            exit 1
          fi

      - name: Switch traffic
        run: |
          # Switch service selector to new color
          kubectl patch svc thai-erp-staging -n staging -p '{"spec":{"selector":{"color":"${{ steps.deploy.outputs.new_color }}"}}}'
          
          # Scale down old environment after 5 minutes
          sleep 300
          kubectl scale deployment thai-erp-staging-${{ steps.deploy.outputs.current_color }} --replicas=0 -n staging || true

      - name: Notify deployment status
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          payload: |
            {
              "text": "Staging deployment ${{ job.status }}: ${{ github.sha }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment ${{ job.status }}*\nCommit: ${{ github.sha }}\nColor: ${{ steps.deploy.outputs.new_color }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # Job 11: Deploy to Production (Blue-Green with Approval)
  # ============================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://thai-erp.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name thai-erp-production

      - name: Pre-deployment checks
        run: |
          echo "🔍 Running pre-deployment checks..."
          
          # Check database connection
          kubectl run db-check --rm -i --restart=Never \
            --image=postgres:16-alpine \
            -- pg_isready -h ${DB_HOST} -p 5432 || exit 1
          
          # Check migrations
          echo "Checking pending migrations..."
          
          echo "✅ Pre-deployment checks passed"

      - name: Create database backup
        run: |
          echo "💾 Creating database backup..."
          kubectl create job backup-before-deploy-$(date +%s) -n production \
            --from=cronjob/database-backup || true
          echo "✅ Backup job created"

      - name: Blue-Green Deployment to Production
        id: deploy
        run: |
          #!/bin/bash
          set -e
          
          # Determine current color
          CURRENT_COLOR=$(kubectl get svc thai-erp -n production -o jsonpath='{.spec.selector.color}' 2>/dev/null || echo "blue")
          
          if [ "$CURRENT_COLOR" = "blue" ]; then
            NEW_COLOR="green"
          else
            NEW_COLOR="blue"
          fi
          
          echo "Current color: $CURRENT_COLOR, Deploying to: $NEW_COLOR"
          echo "new_color=$NEW_COLOR" >> $GITHUB_OUTPUT
          echo "current_color=$CURRENT_COLOR" >> $GITHUB_OUTPUT
          
          # Deploy to inactive environment
          helm upgrade --install thai-erp-${{ env.new_color }} ./infrastructure/helm \
            --namespace production \
            --set image.tag=${{ github.sha }} \
            --set color=${{ env.new_color }} \
            --set replicaCount=3 \
            --values ./infrastructure/helm/values-production.yaml \
            --wait --timeout 15m
          
          # Wait for rollout
          kubectl rollout status deployment/thai-erp-${{ env.new_color }} -n production --timeout=10m
          
          # Run smoke tests
          echo "Running smoke tests..."
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl \
            -- curl -sf http://thai-erp-${{ env.new_color }}.production.svc.cluster.local/api/health || {
              echo "❌ Smoke tests failed"
              exit 1
            }

      - name: Health checks and canary
        run: |
          # Run extended health checks
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://thai-erp-${{ steps.deploy.outputs.new_color }}.production.svc.cluster.local/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check $i passed"
            else
              echo "❌ Health check $i failed with status $STATUS"
              exit 1
            fi
            sleep 30
          done
          
          echo "✅ All health checks passed"

      - name: Switch traffic
        run: |
          # Switch service selector to new color
          kubectl patch svc thai-erp -n production -p '{"spec":{"selector":{"color":"${{ steps.deploy.outputs.new_color }}"}}}'
          
          # Monitor error rate for 5 minutes
          echo "📊 Monitoring error rate for 5 minutes..."
          sleep 300
          
          # Check if error rate increased (simplified check)
          echo "✅ Traffic switched successfully"

      - name: Cleanup old deployment
        run: |
          # Keep old deployment for 1 hour, then scale down
          sleep 3600
          kubectl scale deployment thai-erp-${{ steps.deploy.outputs.current_color }} --replicas=0 -n production || true

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            })

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, initiating rollback..."
          kubectl patch svc thai-erp -n production -p '{"spec":{"selector":{"color":"${{ steps.deploy.outputs.current_color }}"}}}'
          kubectl scale deployment thai-erp-${{ steps.deploy.outputs.new_color }} --replicas=0 -n production
          echo "✅ Rolled back to ${{ steps.deploy.outputs.current_color }}"

      - name: Notify deployment status
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          payload: |
            {
              "text": "Production deployment ${{ job.status }}: ${{ github.sha }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Production Deployment ${{ job.status }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Color:*\n${{ steps.deploy.outputs.new_color }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Deployment"
                      },
                      "url": "https://thai-erp.example.com"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================
  # Job 12: Performance Tests
  # ============================================
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 performance tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: ./tests/performance/load-test.js
          flags: --out json=results.json
        env:
          BASE_URL: https://staging.thai-erp.example.com

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: results.json

      - name: Check performance thresholds
        run: |
          # Parse k6 results and check thresholds
          echo "Checking performance thresholds..."
          # Add threshold checks here
