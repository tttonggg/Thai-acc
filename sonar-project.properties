# SonarQube Configuration
sonar.projectKey=thai-accounting-erp
sonar.projectName=Thai Accounting ERP
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=src
sonar.tests=src,e2e,tests
sonar.inclusions=src/**/*
sonar.exclusions=node_modules/**,.next/**,coverage/**,**/*.test.ts,**/*.spec.ts,src/components/ui/**

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,src/test/**/*,src/**/__mocks__/**

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Code quality
sonar.qualitygate.wait=true

# Security
sonar.security.hotspots.level=high
sonar.security.hotspots.perFile=10

# Duplications
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts

# Language
sonar.language=ts
